<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Heart Disease Prediction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f2f6ff;
}

.card{
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

h1{
font-weight:bold;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="card p-4">

<h1 class="text-center mb-4">❤️ Heart Disease Prediction</h1>

{% if prediction_text %}
<div class="alert alert-info text-center">
<h4>{{ prediction_text }}</h4>
</div>
{% endif %}

<form action="/predict" method="post">

<div class="row">

<div class="col-md-6 mb-3">
<label>Age</label>
<input type="number" name="age" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Sex</label>
<select name="sex" class="form-control">
  <option value="">Select</option>
  <option value="1">Male</option>
  <option value="0">Female</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Chest Pain Type</label>
<select name="cp" class="form-control">
  <option value="">Select</option>
<option value="0">Typical Angina</option>
<option value="1">Atypical Angina</option>
<option value="2">Non-Anginal Pain</option>
<option value="3">Asymptomatic</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Resting Blood Pressure</label>
<input type="number" name="trestbps" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Cholesterol</label>
<input type="number" name="chol" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Fasting Blood Sugar</label>
<select name="fbs" class="form-control">
  <option value="">Select</option>
  <option value="1">True</option>
  <option value="0">False</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Rest ECG</label>
<select name="restecg" class="form-control">
<option value="">Select</option>
<option value="0">Normal</option>
<option value="1">ST-T Abnormality</option>
<option value="2">Left Ventricular Hypertrophy</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Maximum Heart Rate</label>
<input type="number" name="thalach" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Exercise Induced Angina</label>
<select name="exang" class="form-control">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Oldpeak</label>
<input type="number" step="0.1" name="oldpeak" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Slope</label>
<select name="slope" class="form-control">
<option value="">Select</option>
<option value="0">Upsloping</option>
<option value="1">Flat</option>
<option value="2">Downsloping</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>CA</label>
<input type="number" name="ca" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Thal</label>
<select name="thal" class="form-control">
<option value="">Select</option>
<option value="1">Normal</option>
<option value="2">Fixed Defect</option>
<option value="3">Reversible Defect</option>
</select>
</div>

</div>

<div class="text-center mt-3">
<button type="submit" class="btn btn-primary btn-lg">Predict</button>
</div>

</form>

</div>

</div>

</body>
</html>
